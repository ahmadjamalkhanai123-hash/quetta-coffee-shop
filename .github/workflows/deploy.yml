name: Quetta Coffee Shop — CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  AWS_REGION:     ap-south-1
  ECR_REGISTRY:   ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: quetta-coffee-shop
  ECS_CLUSTER:    quetta-coffee-shop-cluster
  ECS_SERVICE:    quetta-coffee-shop-service
  TASK_FAMILY:    quetta-coffee-shop

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Gitleaks — secrets scan ─────────────────────────────────
      - name: Gitleaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 3. Semgrep — SAST code scan (non-blocking) ─────────────────
      - name: Semgrep SAST scan
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: auto

      # ── 4. Configure AWS credentials ───────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── 5. Login to ECR ────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 6. Docker build (SHA tag only — IMMUTABLE ECR) ─────────────
      - name: Build Docker image
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .

      # ── 7. Trivy — CVE scan ────────────────────────────────────────
      - name: Trivy CVE scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL

      # ── 8. Push SHA tag to ECR ─────────────────────────────────────
      - name: Push image to ECR
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      # ── 9. Register new ECS task definition with SHA image ─────────
      - name: Update ECS task definition
        id: task-def
        run: |
          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"

          CURRENT=$(aws ecs describe-task-definition \
            --task-definition $TASK_FAMILY \
            --query 'taskDefinition' \
            --output json)

          NEW_DEF=$(echo "$CURRENT" | jq \
            --arg IMAGE "$IMAGE" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status,
                 .requiresAttributes, .placementConstraints,
                 .compatibilities, .registeredAt, .registeredBy)')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task_arn=$NEW_ARN" >> $GITHUB_OUTPUT

      # ── 10. Deploy new task definition to ECS ─────────────────────
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition ${{ steps.task-def.outputs.task_arn }} \
            --region $AWS_REGION

      # ── 11. Wait for deployment to stabilize ──────────────────────
      - name: Wait for ECS to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION

      # ── 12. Done ──────────────────────────────────────────────────
      - name: Deployment complete
        run: |
          echo "Image: $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          echo "Site:  http://quetta-coffee-shop-alb-213486298.ap-south-1.elb.amazonaws.com"
