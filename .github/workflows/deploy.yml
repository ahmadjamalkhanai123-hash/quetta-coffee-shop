name: Quetta Coffee Shop — CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  AWS_REGION:     ap-south-1
  ECR_REGISTRY:   ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: quetta-coffee-shop
  ECS_CLUSTER:    quetta-coffee-shop-cluster
  ECS_SERVICE:    quetta-coffee-shop-service

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Gitleaks — secrets scan ─────────────────────────────────
      - name: Gitleaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 3. Semgrep — SAST code scan ────────────────────────────────
      - name: Semgrep SAST scan
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: auto

      # ── 4. Configure AWS credentials ───────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── 5. Login to ECR ────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 6. Docker build ────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
                     $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # ── 7. Trivy — CVE scan ────────────────────────────────────────
      - name: Trivy CVE scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL

      # ── 8. Push to ECR ─────────────────────────────────────────────
      - name: Push image to ECR
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # ── 9. Deploy to ECS ───────────────────────────────────────────
      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

      # ── 10. Wait for deployment ────────────────────────────────────
      - name: Wait for ECS to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION

      # ── 11. Done ───────────────────────────────────────────────────
      - name: Deployment complete
        run: |
          echo "Site live at: http://quetta-coffee-shop-alb-213486298.ap-south-1.elb.amazonaws.com"
